version: 0.1

workflows:
  main:
    jobs:
      - build

jobs:
  build:
    steps:
      - clone

      - cache_restore:
          path: node_modules
          key: 'npm-{{ hash "package-lock.json" }}-v1'

      - run: wget -qO- https://api.wodby.com/v1/get/cli | sh
      - run: wodby ci init $WODBY_BUILD_ID

      - run: wodby ci run -s nextjs npm install --global create-next-app@latest
      - run: wodby ci run -s nextjs npx create-next-app@latest . --use-npm --typescript --eslint --app --no-src-dir --tailwind --import-alias "@/*"

      - cache_save:
          key: 'npm-{{ hash "package-lock.json" }}-v1'
          path: node_modules

      - run: wodby ci build nextjs
      - run: wodby ci release
      - run: wodby ci deploy
